<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariana's Notes 🎙️✨</title>
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e1f5fe 100%); 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }

        #quiz-container { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 40px; 
            box-shadow: 0 20px 60px rgba(142, 36, 170, 0.15); 
            text-align: center; 
            width: 340px; 
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h1 { color: #7b1fa2; font-size: 26px; margin-bottom: 20px; }

        .ariana-img { 
            width: 120px; height: 120px; 
            border-radius: 50%; 
            border: 4px solid white; 
            margin-bottom: 20px; 
            object-fit: cover;
        }

        #audio-btn { 
            background: #ab47bc; 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-size: 16px; 
            margin-bottom: 20px; 
            width: 100%; 
            font-weight: bold; 
            box-shadow: 0 5px 15px rgba(171, 71, 188, 0.3);
            transition: 0.3s;
        }

        #audio-btn:disabled { background: #ce93d8; cursor: not-allowed; }

        .option-btn { 
            background: white; 
            border: 2px solid #f3e5f5; 
            padding: 12px; 
            width: 100%; 
            margin: 8px 0; 
            border-radius: 15px; 
            cursor: pointer; 
            font-size: 15px; 
            color: #6a1b9a; 
            font-weight: 600; 
            transition: 0.2s;
        }

        .option-btn:hover { background: #fdf7ff; border-color: #ab47bc; }

        #score-display { margin-top: 20px; font-weight: 800; color: #4a148c; font-size: 18px; }
        #track-info { font-size: 12px; color: #8e24aa; margin-bottom: 10px; opacity: 0.7; }
        
        #player-wrapper { position: absolute; top: -9999px; left: -9999px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
</head>
<body>

<div id="quiz-container">
    <h1>Ariana's Notes 🎙️</h1>
    <div id="track-info">Yükleniyor...</div>
    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Ariana" class="ariana-img">
    
    <button id="audio-btn" onclick="playMusic()" disabled>🎵 HAZIRLANIYOR...</button>
    
    <div id="options"></div>
    <div id="score-display">SKOR: 0</div>
</div>

<div id="player-wrapper">
    <div id="youtube-player"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let player;
    let currentSongIndex = 0; // Sıralı takip için index
    let score = 0;
    let apiReady = false;

    // Şarkı listesi (Güncellendi ve God is a Woman eklendi)
    const songs = [
        { name: "7 Rings", id: "QYh6mYIJG2Y", start: 70 },
        { name: "Thank U, Next", id: "gl1aHhXnN1k", start: 50 },
        { name: "Positions", id: "tcYodQoapMg", start: 40 },
        { name: "Side To Side", id: "SXiSVQZLje8", start: 60 },
        { name: "God is a woman", id: "kHLHSlExFis", start: 80 },
        { name: "No Tears Left to Cry", id: "ffxKSjUwKdU", start: 55 }
    ];

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            height: '0', width: '0',
            playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'origin': window.location.origin },
            events: { 
                'onReady': onPlayerReady
            }
        });
    }

    function onPlayerReady() {
        apiReady = true;
        const btn = document.getElementById('audio-btn');
        btn.disabled = false;
        btn.innerText = "▶ ŞARKIYI DİNLE";
        loadQuestion();
    }

    function loadQuestion() {
        const currentSong = songs[currentSongIndex];
        
        // Şarkıyı arkada hazırla
        player.cueVideoById({
            videoId: currentSong.id,
            startSeconds: currentSong.start
        });

        // Track bilgisini güncelle (Kaçıncı şarkıdayız)
        document.getElementById('track-info').innerText = `Şarkı: ${currentSongIndex + 1} / ${songs.length}`;

        // Seçenekleri oluştur
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        songs.forEach(song => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = song.name;
            btn.onclick = () => checkAnswer(song.name);
            optionsDiv.appendChild(btn);
        });
    }

    function playMusic() {
        if (!apiReady) return;
        
        player.unMute();
        player.setVolume(100);
        player.playVideo();

        const btn = document.getElementById('audio-btn');
        btn.innerText = "🔊 DİNLENİYOR...";
        btn.disabled = true;
        
        setTimeout(() => { 
            player.pauseVideo(); 
            btn.innerText = "▶ TEKRAR DİNLE";
            btn.disabled = false;
        }, 5000);
    }

    function checkAnswer(answer) {
        const currentSong = songs[currentSongIndex];
        player.pauseVideo();

        if (answer === currentSong.name) {
            score += 10;
            alert("DOĞRU! ✨");
        } else {
            alert("YANLIŞ! Bu '" + currentSong.name + "' idi. ☁️");
        }

        document.getElementById('score-display').innerText = "SKOR: " + score;
        
        // SIRALI GEÇİŞ MANTIĞI:
        currentSongIndex++; 
        if (currentSongIndex >= songs.length) {
            currentSongIndex = 0; // Liste biterse başa dön
            alert("Tüm şarkıları bitirdin! En başa dönüyoruz. 🎀");
        }

        document.getElementById('audio-btn').innerText = "▶ YENİ ŞARKIYI DİNLE";
        loadQuestion();
    }
</script>

</body>
</html>
