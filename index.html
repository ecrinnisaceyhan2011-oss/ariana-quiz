<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariana's Notes 🎙️✨</title>
    <style>
        body { margin: 0; background: #f3e5f5; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #quiz-container { background: white; padding: 30px; border-radius: 35px; box-shadow: 0 15px 45px rgba(142, 36, 170, 0.2); text-align: center; width: 340px; border: 2px solid #e1bee7; }
        h1 { color: #8e24aa; font-size: 26px; margin-bottom: 20px; }
        .ariana-img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #ce93d8; margin-bottom: 20px; object-fit: cover; }
        #audio-btn { background: #ab47bc; color: white; border: none; padding: 18px; border-radius: 20px; cursor: pointer; font-size: 18px; margin-bottom: 20px; width: 100%; font-weight: bold; transition: 0.3s; }
        #audio-btn:hover { background: #8e24aa; }
        .option-btn { background: #f8f0f9; border: 2px solid transparent; padding: 14px; width: 100%; margin: 8px 0; border-radius: 18px; cursor: pointer; font-size: 16px; color: #4a148c; font-weight: 600; transition: 0.2s; }
        .option-btn:hover { background: #f3e5f5; border-color: #ce93d8; }
        #score-display { margin-top: 25px; font-weight: bold; color: #7b1fa2; font-size: 18px; }
        /* YouTube oynatıcısını gizliyoruz */
        #youtube-player { display: none; }
    </style>
</head>
<body>

<div id="quiz-container">
    <h1>Ariana's Notes 🎙️</h1>
    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Ariana" class="ariana-img" alt="Ariana">
    
    <button id="audio-btn" onclick="playMusic()">🎵 Şarkıyı Dinle</button>
    
    <div id="options"></div>
    <div id="score-display">Skor: 0</div>
</div>

<div id="youtube-player"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let player;
    let currentSong;
    let score = 0;

    const songs = [
        { name: "7 Rings", id: "QYh6mYIJG2Y", start: 70 },
        { name: "Thank U, Next", id: "gl1aHhXnN1k", start: 50 },
        { name: "Positions", id: "tcYodQoapMg", start: 40 },
        { name: "Side To Side", id: "SXiSVQZLje8", start: 60 },
        { name: "God is a woman", id: "kHLHSlExFis", start: 80 }
    ];

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            height: '0', width: '0',
            videoId: '',
            events: { 'onReady': loadQuestion }
        });
    }

    function loadQuestion() {
        currentSong = songs[Math.floor(Math.random() * songs.length)];
        player.cueVideoById({
            videoId: currentSong.id,
            startSeconds: currentSong.start
        });

        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        songs.forEach(song => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = song.name;
            btn.onclick = () => checkAnswer(song.name);
            optionsDiv.appendChild(btn);
        });
    }

    function playMusic() {
        player.playVideo();
        // 5 saniye sonra otomatik durdur (Tahmin etmesi zor olsun!)
        setTimeout(() => { player.pauseVideo(); }, 5000);
    }

    function checkAnswer(answer) {
        player.pauseVideo();
        if (answer === currentSong.name) {
            score += 10;
            alert("Harika! ✨ Doğru.");
        } else {
            alert("Yanlış! Bu " + currentSong.name + " idi. ☁️");
        }
        document.getElementById('score-display').innerText = "Skor: " + score;
        loadQuestion();
    }
</script>

</body>
</html>
